name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint · test · e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # El cliente Prisma se genera en src/generated/ (no versionado) y los e2e
      # de app.e2e-spec.ts caen a la BD por defecto: db:setup cubre ambos.
      - name: Database setup
        run: pnpm db:setup

      - name: Lint
        run: pnpm lint:ci

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
