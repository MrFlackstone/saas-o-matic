services:
  backend:
    build: ./backend
    ports:
      - '3000:3000'
    volumes:
      - backend-db:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('node:http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-db:
